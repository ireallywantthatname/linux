# Hyprsunset Configuration
# Fast, IPC-controlled blue light filter for Hyprland

max-gamma = 150

# Morning Profile: Normal identity (no filter)
profile {
    time = 7:30
    identity = true
}

# Evening Profile: Soft warm light (4500K temperature)
profile {
    time = 20:00
    temperature = 4500
    gamma = 0.95
}

# Late Night Profile: Warm light (3500K temperature)
profile {
    time = 22:00
    temperature = 3500
    gamma = 0.90
}
