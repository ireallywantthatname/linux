# Hyprlock Configuration
# Auto-generated to match your system theme

# GENERAL
general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
}

# BACKGROUND
background {
    monitor =
    path = screenshot
    color = rgba(28, 28, 28, 1.0)
    
    # Frosted glass blur effect
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.25 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    
    # Themed colors (matches Noto Sans/Catppuccin styling)
    outer_color = rgba(88, 91, 112, 1.0) # Accent Secondary (Surface2)
    inner_color = rgba(30, 30, 46, 0.8) # Base background
    font_color = rgba(205, 214, 244, 1.0) # Text color
    
    # State indicator colors
    active_color = rgba(245, 194, 231, 1.0) # Accent Active (Pink/Flamingo)
    check_color = rgba(249, 226, 175, 1.0) # Active check (Yellow)
    fail_color = rgba(243, 139, 168, 1.0) # Failed attempt (Red)
    
    fade_on_empty = false
    rounding = -1 # Circular capsule style
    placeholder_text = <i>Password...</i>
    hide_input = false
    
    position = 0, -40
    halign = center
    valign = center
}

# TIME LABEL
label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0) # Text color
    font_size = 80
    font_family = Noto Sans Bold
    position = 0, 150
    halign = center
    valign = center
}

# GREETING LABEL
label {
    monitor =
    text = Welcome back, $USER
    color = rgba(205, 214, 244, 0.8) # Semi-transparent text color
    font_size = 20
    font_family = Noto Sans
    position = 0, 60
    halign = center
    valign = center
}
