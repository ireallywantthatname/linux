# Hyprqt6engine Configuration
# Elegant, native theme engine configuration for Qt6 apps

theme {
    # Name of the icon theme (matches fuzzel.ini / hyprtoolkit.conf layout)
    icon_theme = Papirus-Dark
    
    # Widget style for Qt6 apps (e.g., Fusion, Kvantum, Breeze)
    style = Fusion
    
    # Typography settings
    font = Noto Sans
    font_size = 11
    font_fixed = FiraCode Nerd Font
    font_fixed_size = 11
}

misc {
    single_click_activate = true
    menus_have_icons = true
    shortcuts_for_context_menus = true
}
