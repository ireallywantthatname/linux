position = "top"
height = 24

[[start]]
type = "workspaces"

[[center]]
type = "focused"
icon_size = 16

[[end]]
type = "volume"

[[end]]
type = "script"
cmd = "/home/irwtn/.config/ironbar/scripts/brightness.sh"
interval = 1000
mode = "poll"
class = "brightness"
on_scroll_up = "brightnessctl set 5%+"
on_scroll_down = "brightnessctl set 5%-"

[[end]]
type = "script"
cmd = "/home/irwtn/.config/ironbar/scripts/battery.sh"
interval = 5000
mode = "poll"
class = "battery"

[[end]]
type = "sys_info"
format = [
    "{cpu_percent}% ",
    "{memory_percent}% ",
]
interval = { cpu = 1 }

[[end]]
type = "tray"

[[end]]
type = "clock"
